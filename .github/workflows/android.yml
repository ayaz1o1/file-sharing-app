name: Build Android APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ccache git libffi-dev libssl-dev autoconf automake libtool pkg-config zlib1g-dev build-essential
        sudo apt-get install -y openjdk-17-jdk-headless unzip zip

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Buildozer and Cython
      run: |
        pip install --upgrade pip
        pip install git+https://github.com/kivy/buildozer.git@master
        pip install "cython<3.0.0" virtualenv

    - name: Auto-Locate and Build APK
      run: |
        export APP_ANDROID_ACCEPT_SDK_LICENSE=1
        
        # This searches your entire repository structure for buildozer.spec and switches to that folder dynamically
        SPEC_PATH=$(find . -name "buildozer.spec" -print -quit)
        if [ -z "$SPEC_PATH" ]; then
          echo "ERROR: Could not find buildozer.spec anywhere in the repository!"
          exit 1
        fi
        
        TARGET_DIR=$(dirname "$SPEC_PATH")
        echo "Found buildozer.spec in: $TARGET_DIR"
        cd "$TARGET_DIR"
        
        # Start the build execution
        yes | buildozer --verbose android debug

    - name: Locate and Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Network-File-Sharing-APK
        path: "**/bin/*.apk"