name: Build Android APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ccache git libffi-dev libssl-dev autoconf automake libtool pkg-config zlib1g-dev build-essential
        sudo apt-get install -y openjdk-17-jdk-headless unzip zip

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Buildozer and Cython
      run: |
        pip install --upgrade pip
        pip install git+https://github.com/kivy/buildozer.git@master
        pip install "cython<3.0.0" virtualenv

    - name: Execute Buildozer Build
      run: |
        export APP_ANDROID_ACCEPT_SDK_LICENSE=1
        # Removed the 'yes |' pipe completely to fix the broken pipe system crash
        buildozer --verbose android debug
      working-directory: .

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Network-File-Sharing-APK
        path: bin/*.apk